<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table border="1">
      <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Price</th>
      </tr>
      {% for p in products%}
      <tr>
        <td>{{p.id}}</td>
        <td>{{p.name}}</td>
        <td>{{p.price}}</td>
      </tr>
      {%endfor%}
    </table>
    <br />
    <a href="/">Back</a>
  </body>
</html>
